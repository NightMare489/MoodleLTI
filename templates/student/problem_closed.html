{% extends "base.html" %}
{% block title %}Problem Closed{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 4rem; text-align: center;">
    <div class="card" style="padding: 2.5rem;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🚫</div>
        <h2 style="margin-bottom: 0.75rem;">Problem Closed</h2>
        <p class="text-secondary" style="font-size: 1.05rem; line-height: 1.6;">
            <strong>{{ problem.title }}</strong> is no longer accepting submissions.
        </p>
        <a href="{{ url_for('student.problem_list') }}" class="btn btn-primary" style="margin-top: 1.5rem;">
            ← Back to Problems
        </a>
    </div>
</div>
{% endblock %}
